<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyLens — Weather Vision AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400;0,700&family=Inter:wght@300;400;600;700&display=swap"
    rel="stylesheet">

  <!-- ONNX Runtime Web (WebAssembly backend — ไม่ต้องใช้ server เลย) -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #000;
      --surface: #111;
      --border: #222;
      --text: #fff;
      --muted: #707072;
      --accent: #4ade80;
      --rain: #38bdf8;
      --sunrise: #fb923c;
      --cloudy: #94a3b8;
      --shine: #facc15;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    header {
      text-align: left;
      margin-bottom: 4rem;
      position: relative;
    }

    h1 {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 0.9;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .status-badge {
      position: absolute;
      top: 0;
      right: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.4rem 0.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .status-badge.ok {
      color: var(--accent);
    }

    .status-badge.fail {
      color: #f87171;
    }

    .status-badge.loading {
      color: var(--muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .upload-section {
      margin-bottom: 3rem;
    }

    /* FIX: ใช้ label ครอบทั้งกล่อง — native behavior ทำงานบนทุก platform */
    .drop-label {
      display: block;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .drop-zone {
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 4rem 2rem;
      text-align: center;
      transition: all 0.2s ease;
    }

    .drop-label:hover .drop-zone,
    .drop-zone.drag-over {
      border-color: #555;
      background: #161616;
    }

    .drop-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      display: block;
    }

    .drop-zone h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .drop-zone p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .btn-upload {
      display: inline-block;
      padding: 0.9rem 2rem;
      background: var(--text);
      border: none;
      border-radius: 30px;
      color: var(--bg);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ซ่อน input แบบ accessible — ไม่ใช้ display:none */
    #file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      overflow: hidden;
    }

    .preview-strip {
      display: none;
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      gap: 1.5rem;
      align-items: center;
    }

    .preview-strip.visible {
      display: flex;
    }

    .preview-thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .preview-info {
      flex: 1;
      min-width: 0;
    }

    .preview-name {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      word-break: break-all;
    }

    .preview-size {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .btn-analyze {
      padding: 0.6rem 1.5rem;
      background: var(--accent);
      border: none;
      border-radius: 20px;
      color: var(--bg);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-analyze:hover {
      opacity: 0.9;
    }

    .btn-analyze:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .result-section {
      display: none;
      margin-top: 2rem;
    }

    .result-section.visible {
      display: block;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem;
    }

    .result-header {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .result-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .result-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .result-label {
      font-family: 'Archivo Narrow', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .result-desc {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .result-conf {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
    }

    .prob-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .prob-row {
      display: grid;
      grid-template-columns: 100px 1fr 60px;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .prob-name {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .prob-name.top {
      color: var(--text);
      font-weight: 600;
    }

    .prob-track {
      height: 2px;
      background: var(--border);
    }

    .prob-fill {
      height: 100%;
      background: var(--muted);
      width: 0%;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .prob-pct {
      font-size: 0.85rem;
      text-align: right;
      color: var(--muted);
    }

    .prob-pct.top {
      color: var(--text);
      font-weight: 600;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 2rem;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-reset:hover {
      background: #1a1a1a;
    }

    .error-box {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      background: #110808;
      border: 1px solid #3a1a1a;
      color: #ff6b6b;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .error-box.visible {
      display: block;
    }

    footer {
      margin-top: 6rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.6;
    }

    footer span {
      color: var(--text);
    }
  </style>
</head>

<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Analyzing sky conditions</div>
  </div>

  <div class="container">
    <header>
      <h1>SkyLens</h1>
      <div class="tagline">Weather Vision Intelligence</div>
      <div id="statusBadge" class="status-badge loading">
        <span class="status-dot"></span>
        <span id="statusText">LOADING MODEL</span>
      </div>
    </header>

    <div class="upload-section">
      <label class="drop-label" for="file-input">
        <div class="drop-zone" id="dropZone">
          <span class="drop-icon">🌤️</span>
          <h3>Drop Sky Image Here</h3>
          <p>Select a photo from camera roll or gallery</p>
          <span class="btn-upload">Browse Files</span>
        </div>
      </label>

      <!-- ไม่มี capture="environment" — ให้ browser แสดง sheet เลือกเองระหว่างกล้องกับ gallery -->
      <input type="file" id="file-input" accept="image/*">

      <div class="preview-strip" id="previewStrip">
        <img class="preview-thumb" id="previewThumb" src="" alt="Preview">
        <div class="preview-info">
          <div class="preview-name" id="previewName"></div>
          <div class="preview-size" id="previewSize"></div>
          <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">Run Prediction</button>
        </div>
      </div>

      <div class="error-box" id="errorBox"></div>
    </div>

    <div class="result-section" id="resultSection">
      <div class="result-card">
        <div class="result-header">
          <img class="result-img" id="resultImg" src="" alt="Sky">
          <div class="result-main">
            <span class="result-icon" id="resultIcon"></span>
            <div class="result-label" id="resultLabel"></div>
            <div class="result-desc" id="resultDesc"></div>
            <div class="result-conf" id="resultConf"></div>
          </div>
        </div>
        <div id="probBars"></div>
        <button class="btn-reset" onclick="reset()">Scan New Image</button>
      </div>
    </div>

  
  </div>

  <script>
    // ─── Config ─────────────────────────────────────────────────────────────────
    const MODEL_URL = '/static/best_model.onnx';  // Flask serve จาก static/
    const INPUT_SIZE = 64;

    // Class metadata — key ต้องตรงกับ class index ใน model ของคุณ
    // แก้ลำดับให้ตรงกับที่ train: ดูได้จาก data.yaml (names: [...])
    const CLASS_META = [
      { label: 'Cloudy', icon: '☁️', desc: 'Overcast cloudy sky', color: 'var(--cloudy)' },
      { label: 'Rain', icon: '🌧️', desc: 'Rainy conditions detected', color: 'var(--rain)' },
      { label: 'Sunrise', icon: '🌅', desc: 'Beautiful sunrise/sunset sky', color: 'var(--sunrise)' },
      { label: 'Shine', icon: '☀️', desc: 'Clear sunny weather', color: 'var(--shine)' },
    ];

    // ─── ONNX Session ────────────────────────────────────────────────────────────
    let session = null;

    async function loadModel() {
      const badge = document.getElementById('statusBadge');
      const txt = document.getElementById('statusText');
      try {
        // ใช้ wasm backend — ทำงานได้ทุก browser ไม่ต้องการ GPU
        ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/';
        session = await ort.InferenceSession.create(MODEL_URL, {
          executionProviders: ['wasm'],
          graphOptimizationLevel: 'all',
        });
        badge.className = 'status-badge ok';
        txt.textContent = 'ONLINE // BROWSER';
        document.getElementById('analyzeBtn').disabled = false;
      } catch (e) {
        badge.className = 'status-badge fail';
        txt.textContent = 'MODEL ERR';
        showError('Failed to load model: ' + e.message);
      }
    }

    loadModel();

    // ─── File Handling ────────────────────────────────────────────────────────────
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('dropZone');
    let selectedFile = null;
    let previewDataUrl = null;

    ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, ev => {
      ev.preventDefault(); dropZone.classList.add('drag-over');
    }));
    ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, ev => {
      ev.preventDefault(); dropZone.classList.remove('drag-over');
    }));
    dropZone.addEventListener('drop', ev => {
      const f = ev.dataTransfer?.files?.[0];
      if (f) handleFile(f);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files?.[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) { showError('Please upload an image file.'); return; }
      selectedFile = file;
      hideError();
      const reader = new FileReader();
      reader.onload = e => {
        previewDataUrl = e.target.result;
        document.getElementById('previewThumb').src = previewDataUrl;
        document.getElementById('previewName').textContent = file.name;
        document.getElementById('previewSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
        document.getElementById('previewStrip').classList.add('visible');
        document.getElementById('resultSection').classList.remove('visible');
      };
      reader.readAsDataURL(file);
    }

    // ─── Preprocessing ────────────────────────────────────────────────────────────
    function preprocessImage(img) {
      // 1. วาดรูปลง canvas ขนาด INPUT_SIZE x INPUT_SIZE
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = INPUT_SIZE;
      const ctx = canvas.getContext('2d');

      // letterbox: รักษา aspect ratio เหมือนที่ YOLO ทำตอน train
      const scale = Math.min(INPUT_SIZE / img.naturalWidth, INPUT_SIZE / img.naturalHeight);
      const sw = Math.round(img.naturalWidth * scale);
      const sh = Math.round(img.naturalHeight * scale);
      const ox = Math.round((INPUT_SIZE - sw) / 2);
      const oy = Math.round((INPUT_SIZE - sh) / 2);

      ctx.fillStyle = '#808080'; // letterbox gray — ตรงกับ YOLO default
      ctx.fillRect(0, 0, INPUT_SIZE, INPUT_SIZE);
      ctx.drawImage(img, ox, oy, sw, sh);

      // 2. อ่าน pixel → Float32Array ใน CHW format และ normalize 0-1
      const { data } = ctx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
      const n = INPUT_SIZE * INPUT_SIZE;
      const tensor = new Float32Array(3 * n);

      for (let i = 0; i < n; i++) {
        tensor[i] = data[i * 4] / 255;  // R
        tensor[n + i] = data[i * 4 + 1] / 255;  // G
        tensor[2 * n + i] = data[i * 4 + 2] / 255;  // B
      }

      // shape: [1, 3, H, W]
      return new ort.Tensor('float32', tensor, [1, 3, INPUT_SIZE, INPUT_SIZE]);
    }

    // ─── Softmax helper ───────────────────────────────────────────────────────────
    function softmax(arr) {
      const max = Math.max(...arr);
      const exps = arr.map(x => Math.exp(x - max));
      const sum = exps.reduce((a, b) => a + b, 0);
      return exps.map(x => x / sum);
    }

    // ─── Analyze ─────────────────────────────────────────────────────────────────
    async function analyze() {
      if (!selectedFile || !session) return;

      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      document.getElementById('loadingText').textContent = 'Analyzing sky conditions';
      document.getElementById('loadingOverlay').classList.add('active');
      hideError();

      try {
        // โหลดรูปผ่าน Image object เพื่อให้ browser handle EXIF rotation
        const img = await new Promise((res, rej) => {
          const im = new Image();
          im.onload = () => res(im);
          im.onerror = rej;
          im.src = previewDataUrl;
        });

        const inputTensor = preprocessImage(img);

        // ดึงชื่อ input node จาก session (ปลอดภัยกว่า hardcode 'images')
        const inputName = session.inputNames[0];
        const feeds = { [inputName]: inputTensor };

        const output = await session.run(feeds);

        // YOLO classify output shape: [1, num_classes]
        // output node name อาจเป็น 'output0' หรือชื่ออื่น
        const outputName = session.outputNames[0];
        const rawData = Array.from(output[outputName].data);

        // ตรวจว่า output เป็น logits หรือ probabilities แล้ว
        // ถ้า sum ใกล้ 1.0 แสดงว่า softmax ถูกทำใน model แล้ว
        const rawSum = rawData.reduce((a, b) => a + b, 0);
        const probs = Math.abs(rawSum - 1.0) < 0.01 ? rawData : softmax(rawData);

        const results = CLASS_META.map((meta, idx) => ({
          ...meta,
          probability: probs[idx] ?? 0,
        })).sort((a, b) => b.probability - a.probability);

        // Thumbnail
        const thumb = document.createElement('canvas');
        const tSize = 300;
        thumb.width = tSize;
        thumb.height = tSize;
        const tCtx = thumb.getContext('2d');
        const ts = Math.min(tSize / img.naturalWidth, tSize / img.naturalHeight);
        const tw = Math.round(img.naturalWidth * ts);
        const th = Math.round(img.naturalHeight * ts);
        tCtx.fillStyle = '#111';
        tCtx.fillRect(0, 0, tSize, tSize);
        tCtx.drawImage(img, Math.round((tSize - tw) / 2), Math.round((tSize - th) / 2), tw, th);
        const thumbUrl = thumb.toDataURL('image/jpeg', 0.85);

        showResult(results, thumbUrl);

      } catch (err) {
        showError('Prediction failed: ' + err.message);
      } finally {
        document.getElementById('loadingOverlay').classList.remove('active');
        btn.disabled = false;
      }
    }

    // ─── Display Results ─────────────────────────────────────────────────────────
    function showResult(results, thumbUrl) {
      const top = results[0];
      document.getElementById('resultImg').src = thumbUrl;
      document.getElementById('resultIcon').textContent = top.icon;
      document.getElementById('resultLabel').textContent = top.label.toUpperCase();
      document.getElementById('resultDesc').textContent = top.desc;
      document.getElementById('resultConf').textContent =
        `ACCURACY RATIO: ${(top.probability * 100).toFixed(1)}%`;

      const barsEl = document.getElementById('probBars');
      barsEl.innerHTML = '';
      results.forEach((item, i) => {
        const isTop = i === 0;
        const pct = (item.probability * 100).toFixed(1);
        const row = document.createElement('div');
        row.className = 'prob-row';
        row.innerHTML = `
      <div class="prob-name ${isTop ? 'top' : ''}">${item.icon} ${item.label}</div>
      <div class="prob-track">
        <div class="prob-fill" style="background:${isTop ? item.color : 'var(--border)'};" data-w="${pct}"></div>
      </div>
      <div class="prob-pct ${isTop ? 'top' : ''}">${pct}%</div>`;
        barsEl.appendChild(row);
      });

      requestAnimationFrame(() => requestAnimationFrame(() => {
        barsEl.querySelectorAll('.prob-fill').forEach(el => {
          el.style.width = el.dataset.w + '%';
        });
      }));

      document.getElementById('resultSection').classList.add('visible');
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function reset() {
      selectedFile = null;
      previewDataUrl = null;
      document.getElementById('previewStrip').classList.remove('visible');
      document.getElementById('resultSection').classList.remove('visible');
      fileInput.value = '';
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.textContent = msg;
      el.classList.add('visible');
    }
    function hideError() {
      document.getElementById('errorBox').classList.remove('visible');
    }
  </script>
</body>

</html>
